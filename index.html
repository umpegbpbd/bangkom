<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Laporan Bangkom ASN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: Arial, sans-serif; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
        .header-title { background-color: #0d6efd; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
        .month-input { background-color: #e9ecef; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container mt-4 mb-5">
    <div class="card">
        <div class="header-title text-center"><h4>FORM LAPORAN BANGKOM (ASN/PPPK)</h4></div>
        <div class="card-body">
            <select id="selectNama" class="form-select form-select-lg border-primary mb-3">
                <option value="">-- Pilih Nama Pegawai --</option>
            </select>
            
            <div class="row">
                <div class="col-md-6 mb-2"><label>NIP</label><input type="text" id="nip" class="form-control" readonly></div>
                <div class="col-md-6 mb-2"><label>Jabatan</label><input type="text" id="jabatan" class="form-control" readonly></div>
            </div>

            <div class="alert alert-success mt-3">
                <label class="fw-bold">📂 UPLOAD SERTIFIKAT KE DRIVE PRIBADI</label>
                <div class="input-group mt-2">
                    <input type="text" id="linkDrive" class="form-control" readonly placeholder="Link folder Drive akan muncul otomatis...">
                    <button class="btn btn-success" onclick="bukaFolderDrive()">Buka Folder Drive</button>
                </div>
            </div>

            <h5 class="mt-4">Realisasi JP & Sertifikat (Dikelola Admin)</h5>
            <div class="table-responsive">
                <table class="table table-bordered text-center">
                    <thead class="table-light"><tr><th>Bulan</th><th>JP</th><th>Sertifikat</th></tr></thead>
                    <tbody id="realisasiBody"></tbody>
                </table>
            </div>

            <div class="row mt-3">
                <div class="col-md-6"><label>Keikutsertaan Pertama</label><select id="keikutsertaanPertama" class="form-select"><option value="">-- Pilih --</option><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option><option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option><option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option><option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option></select></div>
                <div class="col-md-6"><label>Update SIPKA/SIMPEG</label><select id="updateSipka" class="form-select"><option value="">-- Pilih --</option><option value="SUDAH">SUDAH</option><option value="BELUM">BELUM</option></select></div>
            </div>

            <div class="mt-4 text-end">
                <button class="btn btn-secondary" onclick="downloadExcel()">🔒 Download Report Excel (Admin)</button>
                <button class="btn btn-primary" onclick="simpanKeGithub()">SUBMIT DATA SAYA</button>
            </div>
        </div>
    </div>
</div>

<script>
const GITHUB_TOKEN = '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'; 
const OWNER = 'umpegbpbd';
const REPO = 'bangkom';
const PATH = 'database_bangkom.json';

window.globalDatabase = {};

document.addEventListener("DOMContentLoaded", async () => {
    // 1. Inisialisasi Nama (Instan)
    const dataPegawai = [ /* Data 49 Pegawai Anda */ ];
    const select = document.getElementById('selectNama');
    dataPegawai.forEach(p => {
        let opt = document.createElement('option');
        opt.value = p.nip; opt.text = p.nama;
        select.appendChild(opt);
    });

    // 2. Load Data Database di background
    await loadDatabase();

    select.addEventListener('change', () => {
        const p = dataPegawai.find(x => x.nip === select.value);
        if(!p) return;
        document.getElementById('nip').value = p.nip;
        document.getElementById('jabatan').value = p.jabatan;
        document.getElementById('linkDrive').value = `https://drive.google.com/drive/folders/ID_FOLDER_BERSAMA_ANDA`;
        
        // Render tabel JP/Sertifikat dari data database Admin
        const myData = window.globalDatabase[p.nip] || {realisasi_jp_bulanan: {}, realisasi_sertifikat_bulanan: {}};
        renderTable(myData);
    });
});

async function loadDatabase() {
    try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }});
        if(res.ok) {
            const data = await res.json();
            window.globalDatabase = JSON.parse(atob(data.content));
            window.githubSha = data.sha;
        }
    } catch(e) { console.log("Database load failed"); }
}

function renderTable(data) {
    const tbody = document.getElementById('realisasiBody');
    tbody.innerHTML = '';
    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
    months.forEach(m => {
        tbody.innerHTML += `<tr><td>${m}</td><td>${data.realisasi_jp_bulanan[m] || 0}</td><td>${data.realisasi_sertifikat_bulanan[m] || 0}</td></tr>`;
    });
}

// ... Fungsi simpanKeGithub & downloadExcel tetap berjalan sesuai logika sebelumnya
</script>
</body>
</html>
